# /etc/nginx/conf.d/telegram-mcp.conf
#
# Replace YOUR_DOMAIN with your actual domain or server public IP.
# For HTTPS, run: sudo certbot --nginx -d YOUR_DOMAIN

upstream telegram_mcp {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Redirect HTTP → HTTPS (certbot will add this automatically when you run
# `certbot --nginx --redirect -d YOUR_DOMAIN`)

server {
    listen 80;
    server_name YOUR_DOMAIN;          # e.g. mcp.example.com  or  1.2.3.4

    # Maximum allowed request body (file uploads through MCP tools)
    client_max_body_size 50M;

    # SSE requires long-lived connections — disable buffering
    proxy_buffering        off;
    proxy_cache            off;
    proxy_read_timeout     3600s;
    proxy_send_timeout     3600s;
    keepalive_timeout      3600s;

    # --- Shared-password auth (HTTP Basic) ---
    # Generate the htpasswd file once on the server:
    #   sudo htpasswd -cB /etc/nginx/telegram-mcp.htpasswd team
    # Then `sudo systemctl reload nginx`. Share the user/password out-of-band
    # with the people who need access.
    # COMMENT OUT the two lines below if you don't want auth.
    auth_basic           "Telegram MCP (restricted)";
    auth_basic_user_file /etc/nginx/telegram-mcp.htpasswd;

    # --- MCP SSE endpoint ---
    location /sse {
        proxy_pass         http://telegram_mcp/sse;
        proxy_http_version 1.1;

        proxy_set_header   Host              localhost;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE-specific headers
        proxy_set_header   Connection        '';
        chunked_transfer_encoding on;
        add_header         Cache-Control     no-cache;
        add_header         X-Accel-Buffering no;
    }

    # --- MCP message/POST endpoint ---
    location /messages {
        proxy_pass         http://telegram_mcp/messages;
        proxy_http_version 1.1;

        proxy_set_header   Host              localhost;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- Health check (no auth — used by monitoring) ---
    location /health {
        auth_basic         off;
        proxy_pass         http://telegram_mcp/health;
        proxy_http_version 1.1;
        access_log         off;
    }

    # Block everything else
    location / {
        return 404;
    }
}
